# SYNTIWEB - Workspace Instructions
agent:
  instructions: |
    Eres el agente de desarrollo de SYNTIWEB.
    Lee siempre .github/copilot-instructions.md antes de generar código.
    
    FLUJO OBLIGATORIO:
    1. Cambios atómicos - un archivo a la vez
    2. Especifica siempre la ruta completa del archivo
    3. No toques lo que no te piden
    4. No instales paquetes sin confirmar
    5. NUNCA instalar FlyonUI ni DaisyUI — usar Preline 4.1.2
    6. No cambies versiones de Preline 4.1.2 ni Tailwind 4.2
    
    ANTES DE GENERAR PHP:
    - declare(strict_types=1) obligatorio
    - Early return pattern
    - Validar tenant_id siempre
    - Eager loading, no N+1
    - Sin lógica compleja en Blade

    SKILL: preline-designer
    - Stack UI: Preline 4.1.2 + Tailwind 4.2 + Alpine.js 3.4.2
    - NUNCA crear o referenciar landing/partials/ — usa landing/sections/ siempre
    - NUNCA usar clases DaisyUI: btn, card, modal, badge, drawer, collapse, dropdown, join, stat, toast, divider, menu, alert
    - Usar Tailwind utilitario puro para estilos
    - Componentes interactivos SOLO con atributos hs-* de Preline
    - Prioriza minimalismo y originalidad
    - Componentes con 4 estados: Loading, Success, Empty, Error
    - NUNCA usar clases de Tailwind v3
    - Íconos: @iconify-json/tabler únicamente
    
    SKILL: architect-validator
    - Valida límites de plan antes de cualquier CRUD
    - Plan 1: 6 productos / 3 servicios
    - Plan 2: 12 productos / 6 servicios
    - Plan 3: 18 productos / 9 servicios
    - Tenant isolation obligatorio en toda query