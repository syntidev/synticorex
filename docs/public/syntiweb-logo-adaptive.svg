<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="500" height="500">
  <!--
    SYNTIweb — ADAPTIVE (producción)
    ════════════════════════════════════════════
    Fondo: 100% transparente siempre
    Light mode → bracket #1a1a1a + sombra oscura
    Dark mode  → bracket #FFFFFF + glow suave
    El círculo azul #4A80E4 nunca cambia
    ════════════════════════════════════════════
  -->
  <defs>
    <filter id="sh-b-light" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="sh-c-light" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="sh-b-dark" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FFFFFF" flood-opacity="0.15"/>
    </filter>
    <filter id="sh-c-dark" x="-25%" y="-25%" width="155%" height="155%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="3" flood-color="#1a3a6e" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    .bracket { fill: #1a1a1a; filter: url(#sh-b-light); }
    .dot     { fill: #4A80E4; filter: url(#sh-c-light); }

    @media (prefers-color-scheme: dark) {
      .bracket { fill: #FFFFFF; filter: url(#sh-b-dark); }
      .dot     { fill: #4A80E4; filter: url(#sh-c-dark); }
    }
  </style>

  <path class="bracket"
    d="M 30,22 L 78,22 L 78,70 Q 78,78 70,78 L 62,78 L 62,38 L 22,38 L 22,30 Q 22,22 30,22 Z"
  />
  <circle class="dot" cx="38" cy="63" r="14"/>
</svg>
